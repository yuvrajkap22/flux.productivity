<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1130"/>
      <stop offset="100%" stop-color="#0d0a1a"/>
    </linearGradient>
    <linearGradient id="fGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="40%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  <!-- Subtle inner border -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="2"/>
  <!-- Ambient glow circle -->
  <circle cx="256" cy="240" r="120" fill="rgba(124,58,237,0.08)"/>
  <!-- Stylized F letter -->
  <g filter="url(#glow)" transform="translate(256, 256)">
    <!-- F shape -->
    <path d="M-60,-100 L-60,100 L-20,100 L-20,10 L50,10 L50,-25 L-20,-25 L-20,-65 L60,-65 L60,-100 Z" fill="url(#fGrad)"/>
    <!-- Lightning bolt accent -->
    <path d="M30,-40 L10,5 L35,5 L15,55 L55,0 L30,0 L50,-40 Z" fill="url(#boltGrad)" opacity="0.7"/>
  </g>
</svg>
