name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Start Firebase emulators
        run: scripts/start-emulators.sh > /tmp/firebase-emulators.log 2>&1 &

      - name: Start static server
        run: npx serve dist -l 8081 > /tmp/serve.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8081/login.html >/dev/null && curl -fsS http://127.0.0.1:4000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Services did not start in time" >&2
          exit 1

      - name: Headless smoke test
        run: npm run test:headless

      - name: End-to-end presence test
        run: npm run test:e2e
